version: '3.4'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:latest
    environment:
      MSSQL_SA_PASSWORD: "Fern@nd01331"
      ACCEPT_EULA: "Y"
    ports:
      - "1450:1433"

  login.api:
    container_name: login.api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DockerConnection=Server=sqlserver;Database=MicrosservicePraticle;User ID=sa;Password=Fern@nd01331;Connect Timeout=30;Encrypt=False;TrustServerCertificate=False;ApplicationIntent=ReadWrite;MultiSubnetFailover=False;
    depends_on:
      - sqlserver
    ports:
      - "8001:8080"
    
  usuario.get:
    container_name: usuario.get
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DockerConnection=Server=sqlserver;Database=MicrosservicePraticle;User ID=sa;Password=Fern@nd01331;Connect Timeout=30;Encrypt=False;TrustServerCertificate=False;ApplicationIntent=ReadWrite;MultiSubnetFailover=False;
    depends_on:
      - sqlserver
    ports:
      - "8002:8080"

  usuario.post:
    container_name: usuario.post
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DockerConnection=Server=sqlserver;Database=MicrosservicePraticle;User ID=sa;Password=Fern@nd01331;Connect Timeout=30;Encrypt=False;TrustServerCertificate=False;ApplicationIntent=ReadWrite;MultiSubnetFailover=False;
    depends_on:
      - sqlserver
    ports:
      - "8003:8080"



